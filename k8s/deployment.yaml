apiVersion: apps/v1
kind: Deployment
metadata:
  name: gochina-agent
  namespace: default
  labels:
    app: gochina-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gochina-agent
  template:
    metadata:
      labels:
        app: gochina-agent
    spec:
      containers:
        - name: agent
          image: gochina-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
          envFrom:
            - secretRef:
                name: gochina-agent-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
      restartPolicy: Always
